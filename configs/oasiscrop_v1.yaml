dataset:
  tile_size: 512
  bands: [0, 1, 2]
  class_mapping:
    0: non_cropland
    1: net_cropland
  nodata: null

training:
  model: OasisCropNet
  epochs: 500
  batch_size: 4
  optimizer: AdamW
  learning_rate: 0.0001
  weight_decay: 0.0001
  losses:
    main_bce: 1.0
    main_dice: 0.5
    auxiliary_bce: 0.1
    boundary_bce: 0.2
  boundary_width_pixels: 5
  validation_interval_epochs: 5
  threshold: 0.5

inference:
  window_size: 512
  stride: 256
  threshold: 0.5
  minimum_component_area_m2: 30
  output_cropland_value: 1

validation:
  metrics: [precision, recall, f1, iou, overall_accuracy]
